<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Instagram投稿作成アプリ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <header class="card__header">
        <h1>施工写真から投稿を一括作成</h1>
        <p>写真と入力内容から、Instagram・リール・note用の文章を作成します。</p>
      </header>

      <form id="postForm" class="form">
        <label>ターゲット
          <select id="targetType">
            <option value="women">女性向け</option>
            <option value="owner">大家さん向け</option>
          </select>
        </label>

        <label>テイスト
          <select id="styleType">
            <option value="auto">写真から自動判定</option>
            <option value="cafe">カフェ風</option>
            <option value="hotel">ホテルライク</option>
            <option value="natural">ナチュラル</option>
          </select>
        </label>

        <label>文体モード
          <select id="toneType">
            <option value="soft">やわらかめ</option>
            <option value="craft">職人感強め</option>
            <option value="viral">Instagram伸び重視</option>
          </select>
        </label>

        <label>リール口調
          <select id="reelTone">
            <option value="calm">落ち着いた紹介</option>
            <option value="catchy">テンポよく</option>
            <option value="pro">プロ解説</option>
          </select>
        </label>

        <label>施工内容
          <input type="text" id="workContent" placeholder="例：キッチンのフルリフォーム" required />
        </label>

        <label>こだわりポイント
          <textarea id="specialPoint" placeholder="例：収納力アップと家事動線の改善" required></textarea>
        </label>

        <label>エリア
          <input type="text" id="area" placeholder="例：横浜市港北区" required />
        </label>

        <label>写真の補足説明
          <textarea id="photoDesc" placeholder="例：明るい木目のキッチンと広々カウンター" required></textarea>
        </label>

        <label class="file-input">写真アップロード（最大10枚）
          <input type="file" id="photoFiles" accept="image/*" multiple />
        </label>

        <div class="pairing">
          <label>施工前の写真番号
            <select id="beforeIndex"><option value="">未選択</option></select>
          </label>
          <label>施工後の写真番号
            <select id="afterIndex"><option value="">未選択</option></select>
          </label>
        </div>

        <div id="gallery" class="gallery"></div>
        <button type="submit">投稿をまとめて作成</button>
      </form>
    </section>

    <section class="card output" aria-live="polite">
      <h2>生成結果</h2>
      <div class="output__item"><h3>フック文</h3><p id="copyResult">ここにフック文が表示されます。</p></div>
      <div class="output__item"><h3>共通テイスト分析</h3><p id="styleResult">写真をアップロードして作成ボタンを押すと表示されます。</p></div>
      <div class="output__item"><h3>写真ごとの説明</h3><p id="photoSummaryResult">ここに写真説明が表示されます。</p></div>
      <div class="output__item"><h3>施工前後比較</h3><p id="comparisonResult">施工前後写真を選ぶと比較できます。</p></div>
      <div class="output__item"><h3>Instagramカルーセル投稿文</h3><p id="carouselResult">ここに投稿文が表示されます。</p></div>
      <div class="output__item"><h3>リール用短文</h3><p id="reelResult">ここにリール文が表示されます。</p></div>
      <div class="output__item"><h3>note記事用の長文</h3><p id="noteResult">ここにnote文章が表示されます。</p></div>
      <div class="output__item"><h3>ハッシュタグ</h3><p id="hashtagResult">ここにハッシュタグが表示されます。</p></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
